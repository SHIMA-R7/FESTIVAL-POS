<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/css/admin_log.css">
  <title>売上ログ — 学校祭POS</title>
</head>

<body>

  <div id="login-gate" class="login-gate">
    <div class="login-box">
      <div class="login-icon">🔒</div>
      <h2>管理画面ログイン</h2>
      <p>パスワードを入力してください</p>
      <input type="password" id="login-pw-input" class="login-input" placeholder="パスワード"
        onkeydown="if(event.key==='Enter')submitLogin()">
      <div id="login-error" class="login-error">パスワードが違います</div>
      <button class="login-btn" onclick="submitLogin()">ログイン</button>
    </div>
  </div>

  <div id="app" style="display:none;">
    <header>
      <div class="admin-badge">ADMIN</div>
      <div class="log-badge">📋 LOG</div>
      <h1>売上ログ</h1>
      <a href="/admin" class="back-btn">← 管理画面に戻る</a>
    </header>

    <div class="toolbar">
      <button class="day-btn active day1" id="btn-day1" onclick="setDay(1)">📅 1日目</button>
      <button class="day-btn day2" id="btn-day2" onclick="setDay(2)">📅 2日目</button>
      <select class="store-filter" id="store-filter" onchange="applyFilter()">
        <option value="">全出店</option>
      </select>
      <select class="method-filter" id="method-filter" onchange="applyFilter()">
        <option value="">全支払方法</option>
        <option value="cash">現金</option>
        <option value="paypay">PayPay</option>
      </select>
      <div class="spacer"></div>
      <button class="csv-btn" onclick="exportCSV()">📥 CSVエクスポート</button>
    </div>

    <div class="summary-bar" id="summary-bar"></div>

    <div class="table-wrap">
      <table id="log-table">
        <thead>
          <tr>
            <th class="col-no">#</th>
            <th class="col-time">時刻</th>
            <th class="col-store">出店</th>
            <th class="col-items">商品</th>
            <th class="col-method">支払</th>
            <th class="col-total">合計</th>
          </tr>
        </thead>
        <tbody id="log-tbody">
          <tr>
            <td colspan="6" class="empty-state">読み込み中...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="/js/admin_log.js"></script>
</body>

</html>
