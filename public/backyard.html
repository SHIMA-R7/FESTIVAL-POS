<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>バックヤード画面</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Oswald:wght@600;700&display=swap');
  :root {
    --bg:#1A1A2E; --surface:#16213E; --primary:#7B61FF; --accent:#F5A623;
    --green:#0EC96B; --red:#E53E3E; --text:#E8E8F0; --text-muted:#7A7A9A;
    --border:#2A2A4A; --radius:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'Noto Sans JP',sans-serif;color:var(--text);}

  header{background:var(--surface);padding:14px 20px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--border);flex-shrink:0;}
  .by-badge{background:var(--primary);color:white;padding:4px 12px;border-radius:20px;font-size:0.75rem;font-weight:700;letter-spacing:0.08em;}
  header h1{font-size:1.1rem;font-weight:700;flex:1;}
  .time-display{font-family:'Oswald',sans-serif;font-size:1.4rem;color:var(--accent);letter-spacing:0.05em;}

  .main{display:flex;height:calc(100vh - 58px);overflow:hidden;}

  /* ── 左パネル ── */
  .status-panel{width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:16px 14px;gap:14px;flex-shrink:0;}
  .stat-card{background:var(--bg);border-radius:var(--radius);padding:14px;border:1px solid var(--border);text-align:center;}
  .stat-label{font-size:0.72rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px;}
  .stat-value{font-family:'Oswald',sans-serif;font-size:2rem;color:var(--accent);}
  .stat-unit{font-size:0.82rem;color:var(--text-muted);}
  .stat-card.green .stat-value{color:var(--green);}
  .stock-section{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0;}
  .stock-section h3{font-size:0.72rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px;flex-shrink:0;}
  .stock-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:7px;}
  .stock-item{background:var(--bg);border-radius:10px;padding:9px 11px;display:flex;align-items:center;justify-content:space-between;border:1px solid var(--border);}
  .stock-name{font-size:0.83rem;font-weight:500;}
  .stock-price{font-size:0.72rem;color:var(--text-muted);}
  .stock-count{font-family:'Oswald',sans-serif;font-size:1.2rem;color:var(--text);}
  .stock-count.low{color:var(--primary);}

  /* ⑤ モード表示（切替不可） */
  .mode-indicator{
    margin-top:auto;
    background:var(--bg);border:2px solid var(--border);border-radius:12px;
    padding:10px 12px;font-family:inherit;font-size:0.8rem;font-weight:700;
    color:var(--text-muted);display:flex;align-items:center;justify-content:center;gap:8px;
    cursor:default;user-select:none;
  }
  .mode-indicator.active{background:#F5A62322;border-color:var(--accent);color:var(--accent);}
  .mode-dot{width:8px;height:8px;border-radius:50%;background:var(--text-muted);flex-shrink:0;}
  .mode-indicator.active .mode-dot{background:var(--accent);}

  /* ── 右パネル：ログのみ（⑤ 決済待ちエリアなし） ── */
  .right-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}

  /* ── 売上ログ ── */
  .log-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;}
  .log-header{padding:10px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;}
  .log-header h3{font-size:0.78rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);flex:1;}
  .log-count{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:2px 10px;font-size:0.72rem;color:var(--text-muted);}
  .log-body{flex:1;overflow-y:auto;padding:0;}

  /* ── 表形式ログ ── */
  .log-table{width:100%;border-collapse:collapse;table-layout:fixed;}

  .log-table thead th{position:sticky;top:0;z-index:2;}
  .log-table th{
    background:#0D1A30;color:var(--text-muted);
    font-size:0.7rem;font-weight:700;letter-spacing:0.06em;
    padding:8px 4px;text-align:center;
    border-bottom:2px solid var(--border);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .log-table th.col-fixed{text-align:left;padding-left:10px;}

  .log-table tbody tr{
    border-bottom:1px solid var(--border);
    transition:background 0.12s;
    animation:fadeSlide 0.22s ease;
  }
  @keyframes fadeSlide{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}
  .log-table tbody tr:hover{background:rgba(255,255,255,0.04);}

  /* ⑤ バックヤードは行を大きく（数字を行高いっぱいに） */
  .log-table td{
    padding:0 4px;
    height:56px;          /* バックヤードは少し大きめ */
    text-align:center;
    font-family:'Oswald',sans-serif;
    font-size:1.05rem;
    color:var(--text);
    vertical-align:middle;
  }
  .log-table td.col-fixed{text-align:left;padding-left:10px;font-family:'Noto Sans JP',sans-serif;font-size:0.82rem;}
  .log-table td.qty-zero{color:var(--border);}
  .log-table td.qty-pos{
    color:var(--accent);
    font-weight:700;
    font-size:3rem;       /* バックヤードはさらに大きく */
    line-height:56px;
    padding:0 2px;
  }

  .col-num{width:36px;color:var(--text-muted);font-size:0.82rem;}
  .col-ticket{width:72px;}
  .col-delivered{width:44px;}
  .col-time{width:48px;font-size:0.8rem;color:var(--text-muted);font-family:'Oswald',sans-serif;}
  .col-method{width:54px;}
  .col-total{width:68px;color:var(--green);}

  .log-method{padding:2px 6px;border-radius:8px;font-size:0.68rem;font-weight:700;font-family:'Noto Sans JP',sans-serif;}
  .log-method.cash{background:#06D6A022;color:#06D6A0;}
  .log-method.paypay{background:#E74C3C22;color:#E74C3C;}

  /* ③ 番号札セル */
  .ticket-cell{display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1;gap:1px;}
  .ticket-order-num{font-size:0.6rem;color:var(--text-muted);font-family:'Oswald',sans-serif;}
  .ticket-circle{font-size:2.4rem;line-height:1;color:#fff;}

  /* ④ チェックボックス */
  .delivered-cb{
    appearance:none;-webkit-appearance:none;
    width:32px;height:32px;border:2px solid var(--border);border-radius:7px;
    background:var(--bg);cursor:pointer;position:relative;transition:all 0.15s;flex-shrink:0;
  }
  .delivered-cb:checked{background:var(--green);border-color:var(--green);}
  .delivered-cb:checked::after{
    content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    color:white;font-size:1.1rem;font-weight:700;
  }
  .delivered-cb:active{transform:scale(0.9);}
  .log-table tbody tr.is-delivered td{opacity:0.38;}
  .log-table tbody tr.is-delivered td.col-delivered-td{opacity:1;}

  .log-empty{text-align:center;color:var(--text-muted);font-size:0.82rem;padding:40px 20px;}

  /* 接続待ち */
  #connecting{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:300;}
  .spinner{width:46px;height:46px;border:4px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 0.9s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  #connecting p{color:var(--text-muted);font-size:0.92rem;}

  .day-badge-hdr{padding:3px 12px;border-radius:20px;font-size:0.78rem;font-weight:700;flex-shrink:0;}
  .day-badge-hdr.day1{background:#3B4CCA;color:white;}
  .day-badge-hdr.day2{background:#E53E3E;color:white;}
  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
</style>
</head>
<body>

<div id="connecting"><div class="spinner"></div><p>サーバーに接続中...</p></div>

<header>
  <div class="by-badge">BACKYARD</div>
  <h1 id="store-name">読み込み中...</h1>
  <div class="day-badge-hdr day1" id="day-badge-hdr">1日目</div>
  <div class="time-display" id="time">--:--</div>
</header>

<div class="main">
  <!-- 左パネル -->
  <div class="status-panel">
    <div class="stat-card green">
      <div class="stat-label">売上合計</div>
      <div class="stat-value">¥<span id="revenue">0</span></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">取引件数</div>
      <div class="stat-value"><span id="sales-count">0</span><span class="stat-unit"> 件</span></div>
    </div>
    <div class="stock-section">
      <h3>在庫状況</h3>
      <div class="stock-list" id="stock-list"></div>
    </div>
    <!-- ⑤ モード表示のみ（切替ボタンなし） -->
    <div class="mode-indicator" id="mode-indicator">
      <span class="mode-dot"></span>
      <span id="mode-label">通常モード</span>
    </div>
  </div>

  <!-- 右パネル（⑤ 決済待ちエリアなし、ログのみ） -->
  <div class="right-panel">
    <div class="log-panel">
      <div class="log-header">
        <h3>📋 売上ログ</h3>
        <div class="log-count" id="log-count">0件</div>
      </div>
      <div class="log-body" id="log-body">
        <div class="log-empty">まだ売上がありません</div>
      </div>
    </div>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
const STORE_ID = params.get('store') || 'store1';
const WS_URL = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host;

let ws, salesData = [], numberMode = false;

const CIRCLE_NUMS = ['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩',
                     '⑪','⑫','⑬','⑭','⑮','⑯','⑰','⑱','⑲','⑳'];
function ticketNum(orderNum) {
  const r = orderNum % 20;
  return r === 0 ? 20 : r;
}

// 時計
setInterval(() => {
  const now = new Date();
  document.getElementById('time').textContent =
    String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
}, 1000);

// ── WebSocket ──────────────────────────────────────────────────
function updateDayBadge(day) {
  const el = document.getElementById('day-badge-hdr');
  if (!el) return;
  el.textContent = day === 2 ? '2日目' : '1日目';
  el.className = 'day-badge-hdr ' + (day === 2 ? 'day2' : 'day1');
}

function connect() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => ws.send(JSON.stringify({ type:'REGISTER', role:'backyard', storeId:STORE_ID }));
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'REGISTERED') { document.getElementById('connecting').style.display = 'none'; if (msg.currentDay) updateDayBadge(msg.currentDay); }
    if (msg.type === 'STORE_STATE') updateState(msg.store);
    if (msg.type === 'DAY_STATE') { updateDayBadge(msg.currentDay); }
    if (msg.type === 'STORE_DELETED') location.reload();
  };
  ws.onclose = () => {
    document.getElementById('connecting').style.display = 'flex';
    setTimeout(connect, 2000);
  };
}

// ── 状態更新 ──────────────────────────────────────────────────
function updateState(store) {
  if (store.currentDay) updateDayBadge(store.currentDay);
  document.getElementById('store-name').textContent = '🍳 ' + store.name;
  document.getElementById('revenue').textContent = store.totalRevenue.toLocaleString();
  document.getElementById('sales-count').textContent = store.salesCount;

  numberMode = !!store.numberMode;
  const ind = document.getElementById('mode-indicator');
  document.getElementById('mode-label').textContent = numberMode ? '番号札モード' : '通常モード';
  ind.classList.toggle('active', numberMode);

  document.getElementById('stock-list').innerHTML = store.products.map(p => `
    <div class="stock-item">
      <div><div class="stock-name">${esc(p.name)}</div><div class="stock-price">¥${p.price}</div></div>
      <div class="stock-count${p.stock <= 5 ? ' low' : ''}">${p.stock}</div>
    </div>`).join('');

  salesData = store.sales || [];
  renderLog();
}

// ── 売上ログ描画 ──────────────────────────────────────────────
function renderLog() {
  const body = document.getElementById('log-body');
  document.getElementById('log-count').textContent = salesData.length + '件';

  if (!salesData.length) {
    body.innerHTML = '<div class="log-empty">まだ売上がありません</div>';
    return;
  }

  const productMap = {};
  salesData.forEach(s => {
    s.items.forEach(item => {
      if (!(item.id in productMap)) productMap[item.id] = item.name;
    });
  });
  const productIds = Object.keys(productMap);
  const productNames = productIds.map(id => productMap[id]);

  const ticketHeader = numberMode
    ? '<th class="col-ticket">番号札</th><th class="col-delivered">渡</th>'
    : '';
  const headerCells = [
    '<th class="col-fixed col-num">#</th>',
    ticketHeader,
    '<th class="col-fixed col-time">時刻</th>',
    '<th class="col-method">支払</th>',
    ...productNames.map(name => `<th title="${esc(name)}">${esc(name.length > 6 ? name.slice(0,5)+'…' : name)}</th>`),
    '<th class="col-total">合計</th>',
    // ⑤ 取消列なし
  ].join('');

  const rows = [...salesData].map((s, i) => ({ ...s, origIndex: i })).reverse();
  const dataRows = rows.map((s, revI) => {
    const num = salesData.length - revI;
    const time = new Date(s.time).toLocaleTimeString('ja-JP', { hour:'2-digit', minute:'2-digit' });
    const methodClass = s.method === 'paypay' ? 'paypay' : 'cash';
    const methodLabel = s.method === 'paypay' ? 'PayPay' : '現金';
    const isDelivered = !!s.delivered;
    const tn = ticketNum(num);

    const ticketCells = numberMode ? `
      <td class="col-ticket" style="padding:0 2px;">
        <div class="ticket-cell">
          <div class="ticket-order-num">#${num}</div>
          <div class="ticket-circle">${CIRCLE_NUMS[tn-1]}</div>
        </div>
      </td>
      <td class="col-delivered-td col-delivered" style="text-align:center;vertical-align:middle;">
        <input type="checkbox" class="delivered-cb" ${isDelivered ? 'checked' : ''}
          onchange="toggleDelivered(${s.origIndex})" onclick="event.stopPropagation()">
      </td>` : '';

    const qtyCells = productIds.map(pid => {
      const found = s.items.find(i => String(i.id) === String(pid));
      const qty = found ? found.qty : 0;
      return qty > 0
        ? `<td class="qty-pos">${qty}</td>`
        : `<td class="qty-zero">—</td>`;
    }).join('');

    return `<tr id="log-row-${s.origIndex}" class="${isDelivered ? 'is-delivered' : ''}">
      <td class="col-fixed col-num">#${num}</td>
      ${ticketCells}
      <td class="col-fixed col-time">${time}</td>
      <td class="col-method"><span class="log-method ${methodClass}">${methodLabel}</span></td>
      ${qtyCells}
      <td class="col-total">¥${s.total.toLocaleString()}</td>
    </tr>`;
  }).join('');

  body.innerHTML = `<table class="log-table">
    <thead><tr>${headerCells}</tr></thead>
    <tbody>${dataRows}</tbody>
  </table>`;
}

// ④ バックヤードからもチェックボックス操作可能
function toggleDelivered(saleIndex) {
  ws.send(JSON.stringify({ type:'TOGGLE_DELIVERED', storeId:STORE_ID, saleIndex }));
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

connect();
</script>
</body>
</html>
