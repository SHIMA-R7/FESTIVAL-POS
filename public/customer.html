<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="stylesheet" href="/css/customer.css">
  <title>ご注文</title>
</head>

<body>
  <div id="connecting">
    <div class="spinner"></div>
    <p>接続中...</p>
  </div>

  <header>
    <div class="logo-wrap" id="logo-wrap">
      <div class="logo-placeholder">🎪</div>
    </div>
    <div class="day-badge-hdr day1" id="day-badge-hdr">1日目</div>
    <h1 id="store-name">読み込み中...</h1>
    <div class="store-badge" id="store-badge">--</div>
  </header>

  <div id="over-banner" class="over-banner" style="display:none;">⚡ 現在予定売り上げ数を突破！</div>
  <div class="main">
    <div class="products-area" id="products-area">
      <div style="color:#ccc;text-align:center;padding:40px;grid-column:1/-1">読み込み中...</div>
    </div>
    <div class="cart-sidebar">
      <div class="cart-header">
        <h2>🛒 カート</h2>
        <div class="cart-count" id="cart-count">0</div>
      </div>
      <div class="cart-items" id="cart-items">
        <div class="cart-empty"><span class="cart-empty-icon">🛍️</span>商品を選んでください</div>
      </div>
      <div class="cart-footer">
        <div class="total-row"><span class="total-label">合計</span><span class="total-amount"><span>¥</span><span
              id="total-display">0</span></span></div>
        <button class="btn-pay" id="btn-pay" disabled>決済へ進む →</button>
      </div>
    </div>
  </div>

  <!-- 決済モーダル -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div id="method-select-screen">
        <h2>💳 お支払い方法</h2>
        <div class="modal-total"><span>¥</span><span id="modal-total">0</span></div>
        <div class="pay-method-btns">
          <button class="pay-method-btn cash" onclick="selectPayment('cash')"><span
              class="pay-method-icon">💴</span>現金</button>
          <button class="pay-method-btn paypay" onclick="selectPayment('paypay')"><span
              class="pay-method-icon">📱</span>PayPay</button>
        </div>
        <button class="btn-cancel-modal" onclick="cancelPayment()">← カートに戻る</button>
      </div>
      <div id="paypay-screen" class="qr-screen">
        <h2>📱 PayPayで送金</h2>
        <div class="qr-amount">¥<span id="qr-amount">0</span></div>
        <div class="qr-wrap" id="qr-wrap">
          <img id="qr-img" style="width:100%;height:100%;object-fit:contain;display:none;" alt="PayPay QR">
          <div id="qr-fallback"
            style="display:none;font-size:0.75rem;color:#999;text-align:center;padding:10px;line-height:1.6;">
            QR画像を<br>読み込み中...
          </div>
        </div>
        <p class="qr-note">
          PayPayカメラでQRを読み取り<br>
          <strong id="qr-amount2">0</strong>円を送金してください
        </p>
        <div id="qr-warn"
          style="display:none;margin-top:8px;padding:8px 12px;background:#FFF5F5;border-radius:10px;font-size:0.72rem;color:#C0392B;line-height:1.5;">
        </div>
        <button class="btn-cancel-modal" onclick="cancelPayment()">← キャンセル</button>
      </div>
      <div id="cash-screen" class="cash-screen">
        <span class="cash-icon">💴</span>
        <h2>現金でのお支払い</h2>
        <div class="cash-amount">¥<span id="cash-amount">0</span></div>
        <p>店員にお支払いください。<br>店員が確認後、完了します。</p>
        <button class="btn-cancel-modal" onclick="cancelPayment()">← キャンセル</button>
      </div>
    </div>
  </div>

  <div class="done-overlay" id="done-overlay">
    <div class="done-icon">✅</div>
    <div class="done-text">ありがとうございました！</div>
    <div class="done-sub">またのご来店をお待ちしています</div>
  </div>


  <script src="/js/customer.js"></script>
</body>

</html>
